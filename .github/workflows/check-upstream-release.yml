name: Check for Upstream Release Tag Updates

on:
  workflow_run:
    workflows: ["Upstream Sync"]  # 当同步工作流完成时触发
    types:
      - completed

jobs:
  check_release_tag:
    name: Check for new release tag
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: 获取上游仓库的最新 release tag
      - name: Fetch latest release tag from upstream
        id: fetch_latest_release
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/lobehub/lobe-chat/releases/latest | jq -r .tag_name)
          echo "Latest upstream release tag: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      # Step 2: 获取本地缓存的最新 release tag
      - name: Restore last checked release tag
        id: restore_tag
        uses: actions/cache@v3
        with:
          path: ./last_checked_tag.txt
          key: last-checked-tag
          restore-keys: last-checked-tag

      # Step 3: 比较上游仓库的 release tag 与上次检查的 tag
      - name: Compare tags
        id: compare_tags
        run: |
          if [ -f last_checked_tag.txt ]; then
            LAST_CHECKED_TAG=$(cat last_checked_tag.txt)
            echo "Last checked release tag: $LAST_CHECKED_TAG"
          else
            LAST_CHECKED_TAG="none"
            echo "No previous release tag found, assuming this is the first run."
          fi  # 这里确保 if 语句正确结束

          if [ "$LATEST_TAG" != "$LAST_CHECKED_TAG" ]; then
            echo "New release detected: $LATEST_TAG"
            echo "new_release=true" >> $GITHUB_ENV
          else
            echo "No new release."
            echo "new_release=false" >> $GITHUB_ENV
          fi

      # Step 4: 更新本地缓存的最新 release tag
      - name: Cache the latest release tag
        if: env.new_release == 'true'
        run: |
          echo "$LATEST_TAG" > last_checked_tag.txt
      - uses: actions/cache@v3
        with:
          path: ./last_checked_tag.txt
          key: last-checked-tag

      # Step 5: 触发 Docker build 工作流（如果有新 release tag）
      - name: Trigger Docker Build
        if: env.new_release == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-database.yml',  # 这里是你要触发的工作流文件
              ref: 'main'
            })


