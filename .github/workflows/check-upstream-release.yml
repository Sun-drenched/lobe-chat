name: Check for Upstream Release Tag Updates

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Upstream Sync"]
    types:
      - completed

jobs:
  check_release_tag:
    name: Check for new release tag
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: 获取上游仓库的最新 release tag
      - name: Fetch latest release tag from upstream
        id: fetch_latest_release
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/lobehub/lobe-chat/releases/latest | jq -r .tag_name)
          echo "Latest upstream release tag: $LATEST_TAG"
          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      # Step 2: 恢复本地缓存的最新 release tag
      - name: Restore last checked release tag
        id: restore_tag
        uses: actions/cache@v3
        with:
          path: ./last_checked_tag.txt
          key: last-checked-tag

      # Step 3: 输出当前保存的最新版本号
      - name: Output current saved release tag
        run: |
          if [ -f last_checked_tag.txt ]; then
            echo "Current saved release tag: $(cat last_checked_tag.txt)"
          else
            echo "No previous release tag found."
          fi

      # Step 4: 比较上游仓库的 release tag 与上次检查的 tag
      - name: Compare tags
        id: compare_tags
        run: |
          if [ -f last_checked_tag.txt ]; then
            LAST_CHECKED_TAG=$(cat last_checked_tag.txt)
            echo "Last checked release tag: $LAST_CHECKED_TAG"
          else
            LAST_CHECKED_TAG="none"
            echo "No previous release tag found, assuming this is the first run."
          fi

          if [ "$LATEST_TAG" != "$LAST_CHECKED_TAG" ]; then
            echo "New release detected: $LATEST_TAG"
            echo "new_release=true" >> $GITHUB_ENV
            echo "$LATEST_TAG" > last_checked_tag.txt  # 更新版本号
          else
            echo "No new release."
            echo "new_release=false" >> $GITHUB_ENV
          fi

      # Step 5: 缓存更新后的最新 release tag
      - name: Cache the latest release tag
        uses: actions/cache@v3
        if: env.new_release == 'true'
        with:
          path: last_checked_tag.txt
          key: last-checked-tag

      # Step 6: 输出更新后的保存的版本号
      - name: Output updated saved release tag
        if: env.new_release == 'true'
        run: |
          echo "Updated saved release tag: $(cat last_checked_tag.txt)"

      # Step 7: 触发 Docker build 工作流（如果有新 release tag）
      - name: Trigger Docker Build
        if: env.new_release == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-database.yml',
              ref: 'main'
            })
