name: Check and Build Docker Image

on:
  schedule:
    - cron: '0 */1 * * *' # 每小时运行一次
  workflow_dispatch:

jobs:
  check_and_build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Get latest release tag from upstream
        id: get_release
        run: |
          latest_release=$(curl -s https://api.github.com/repos/lobehub/lobe-chat/releases/latest | jq -r '.tag_name')
          echo "latest_release=$latest_release" >> $GITHUB_ENV

      - name: Get last checked release tag
        id: last_release
        run: |
          last_release=$(cat .last_release || echo "")
          echo "last_release=$last_release" >> $GITHUB_ENV

      - name: Check if release tag is updated
        id: check_release
        run: |
          if [ "$latest_release" != "$last_release" ]; then
            echo "release_updated=true" >> $GITHUB_ENV
            echo "$latest_release" > .last_release
            git add .last_release
            git commit -m "Update last checked release"
            git push
          else
            echo "release_updated=false" >> $GITHUB_ENV
          fi

      - name: Stop if no new release
        if: env.release_updated == 'false'
        run: echo "No new release. Exiting."

      - name: Log in to Docker Hub
        if: env.release_updated == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_REGISTRY_USER }}
          password: ${{ secrets.DOCKER_REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        if: env.release_updated == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ACR_REGISTRY }}/main0/lobechat_database_clerk
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Set up Docker Buildx
        if: env.release_updated == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        if: env.release_updated == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.database
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
